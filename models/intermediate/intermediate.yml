version : 2

models:
  - name: int_deal_changes
    description: "This model is used to deduplicate the deal changes data based on the specified columns."
    columns:
      - name: deal_id
        description: "Unique identifier for each deal."   
        tests:
          - not_null
      - name: change_time
        description: "Timestamp of when the change occurred."   
        tests:
          - not_null
      - name: stage_id
        description: "The specific stage that was changed in the deal."   
        tests:
          - not_null
      - name: funnel_step
        description: "The specific funnel step that was changed in the deal."   
        tests:
          - not_null
      - name: kpi_name
        description: "The specific KPI name that was changed in the deal."   
        tests:
          - not_null

  - name: int_activity_filtered
    description: "This model is used to filter the activity data based on the specified columns and conditions."
    columns:
      - name: activity_id
        description: "Unique identifier for each activity."   
        tests:
           - not_null
      - name: assigned_user_id
        description: "Identifier for the user to whom the activity is assigned."   
        tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      - name: deal_id
        description: "Identifier for the deal associated with the activity."   
        tests:
          - not_null
          - unique
      - name: is_completed
        description: "Boolean indicating whether the activity is completed or not."   
        tests:
          - not_null
      - name: due_date
        description: "The date by which the activity is due."   
        tests:
          - not_null
      - name: funnel_step
        description: "The specific funnel step that was changed in the activity."   
        tests:
          - not_null
      - name: kpi_name
        description: "The specific KPI name that was changed in the activity."   
        tests:
          - not_null
  - name: int_union_deals_activity
    description: "This model is used to union the filtered deal changes and activity data based on the specified columns."
    columns:
      - name: deal_id
        description: "Unique identifier for each deal."   
        tests:
          - not_null
      - name: deal_change_time
        description: "Timestamp of when the change occurred."   
        tests:
          - not_null
      - name: funnel_step
        description: "The specific funnel step that was changed in the deal or activity."   
        tests:
          - not_null
      - name: kpi_name
        description: "The specific KPI name that was changed in the deal or activity."   
        tests:
          - not_null
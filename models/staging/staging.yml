version: 2
models:
  - name: stg_deal_changes
    columns:
      - name: deal_id 
        tests:
          - not_null
      - name: change_time
        tests:
          - not_null
      - name: changed_field_key 
        tests:
          - not_null
          - relationships:
              to: ref('stg_fields')
              field: field_key
      - name: new_value
        tests:
          - not_null
  - name: stg_activity
    columns:
      - name: activity_id
        tests:
           - not_null
      - name: activity_type
        description: "The type of activity performed."   
        tests:
          - accepted_values:
              arguments:
                values:
                  - meeting
                  - sc_2
                  - follow_up
                  - after_close_call
          - relationships:
              to: ref('stg_activity_types')
              field: activity_type
      - name: assigned_user_id
        description: "Identifier for the user to whom the activity is assigned."   
        tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      - name: deal_id
        description: "Identifier for the deal associated with the activity."   
        tests:
          - not_null
      - name: is_completed
        description: "Boolean indicating whether the activity is completed or not."   
        tests:
          - not_null
      - name: due_date
        description: "The date by which the activity is due."   
        tests:
          - not_null
  - name: stg_activity_types
    columns:
      - name: activity_type_id
        description: "Unique identifier for each activity type."   
        tests:
          - not_null
          - unique
      - name: activity_type_name
        description: "The name of the activity type."   
        tests:
          - not_null
      - name: is_active
        description: "Boolean indicating whether the activity type is active or not."   
        tests:
          - not_null
      - name: activity_type
        description: "The category or classification of the activity type."   
        tests:
          - accepted_values:
              arguments:
                values:
                  - meeting
                  - sc_2
                  - follow_up
                  - after_close_call
  - name: stg_users
    columns:
      - name: user_id
        description: "Unique identifier for each user."   
        tests:
          - not_null
          - unique
      - name: user_name
        description: "The name of the user."   
        tests:
          - not_null
      - name: email
        description: "The email address of the user."
        tests:
          - not_null
      - name: modified_time  
        tests:
          - not_null
  - name: stg_stages
    columns:
      - name: stage_id
        description: "Unique identifier for each stage."   
        tests:
          - not_null
          - unique
      - name: stage_name
        description: "The name of the stage."   
        tests:
          - not_null

    
